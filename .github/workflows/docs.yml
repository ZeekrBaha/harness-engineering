name: docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # docs:build fails on dead internal links (ignoreDeadLinks: false),
      # so this single job is both the build gate and the link-integrity check.
      - run: npm run docs:build
